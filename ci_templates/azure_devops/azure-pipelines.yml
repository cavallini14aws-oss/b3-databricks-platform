trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - "*"

stages:
  - stage: Validate
    displayName: Validate bundle artifacts
    jobs:
      - job: validate_bundle
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - script: python -m compileall data_platform config pipelines resources sql
            displayName: Compile Python
          - script: echo "Gerar artifacts da plataforma"
            displayName: Generate platform artifacts
          - script: echo "databricks bundle validate -t dev"
            displayName: Validate Databricks bundle for dev

  - stage: DeployDev
    displayName: Deploy to DEV
    dependsOn: Validate
    jobs:
      - deployment: deploy_dev
        environment: databricks-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: echo "databricks bundle deploy -t dev"
                  displayName: Deploy bundle to DEV

  - stage: DeployHml
    displayName: Deploy to HML
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: deploy_hml
        environment: databricks-hml
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: echo "databricks bundle deploy -t hml"
                  displayName: Deploy bundle to HML

  - stage: DeployPrd
    displayName: Deploy to PRD
    dependsOn: DeployHml
    condition: succeeded()
    jobs:
      - deployment: deploy_prd
        environment: databricks-prd
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: echo "databricks bundle deploy -t prd"
                  displayName: Deploy bundle to PRD
