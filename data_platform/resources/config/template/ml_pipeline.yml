pipeline:
  name: template_ml_pipeline
  domain: template
  layer: ml
  enabled: true

execution:
  mode: batch

model:
  name: template_model

dataset:
  version: v1
  feature_columns:
    - feature_a
    - feature_b
  label_column: label

evaluation:
  metrics:
    - accuracy
    - f1
    - auc
  generate_confusion_matrix: true
  generate_baseline: true
