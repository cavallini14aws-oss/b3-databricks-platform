environment: dev

storage:
  mode: table
  catalog: <catalog>
  schema: silver
  volume_catalog: <catalog>
  volume_schema: ai
  volume_name: pdf_rag_lab_docs
  volume_path: /Volumes/<catalog>/ai/pdf_rag_lab_docs

grants:
  required_table_permissions:
    - USE CATALOG
    - USE SCHEMA
    - SELECT
    - MODIFY
    - CREATE TABLE
  required_volume_permissions:
    - READ VOLUME
    - WRITE VOLUME

identity:
  allowed_executor_types:
    - user
    - service_principal
  expected_user: <optional_user>
  expected_service_principal: <optional_sp>
  expected_group: <group_name>

compute:
  allowed_cluster_modes:
    - job_cluster
    - all_purpose
  min_runtime: "15.4"
  requires_uc_access: true

naming:
  expected_catalog: <catalog>
  expected_schema: silver
  expected_volume_schema: ai
