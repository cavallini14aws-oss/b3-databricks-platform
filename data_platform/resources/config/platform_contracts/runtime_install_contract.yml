runtime_install_governance:
  dev:
    manual_pip_install_allowed: true
    approved_install_channels:
      - wheel
      - requirements
      - manual_pip
    approved_exception_required: false

  hml:
    manual_pip_install_allowed: false
    approved_install_channels:
      - wheel
      - requirements
    approved_exception_required: true

  prd:
    manual_pip_install_allowed: false
    approved_install_channels:
      - wheel
      - requirements
    approved_exception_required: true

  forbidden_manual_install_patterns:
    - "pip install"
    - "%pip install"
    - "dbutils.library.installPyPI"
    - "python -m pip install"

  scan_targets:
    - ".github/workflows"
    - "bin"
    - "notebooks"
    - "pipelines"
    - "services"
    - "data_platform"

  ignore_paths:
    - "docs"
    - "frontend"
    - "dist"
    - "build"
    - ".venv"
    - "data_platform/resources/config/platform_contracts/runtime_install_contract.yml"
    - "data_platform/governance/runtime_install_validator.py"
    - "docs/platform_governance/runtime_install_governance.md"
    - "docs/platform_governance/runtime_install_exceptions.yml"

  exceptions_file: "docs/platform_governance/runtime_install_exceptions.yml"
