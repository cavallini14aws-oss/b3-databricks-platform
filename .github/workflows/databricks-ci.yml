name: Databricks CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DEV_WORKSPACE_HOST: ${{ secrets.DEV_WORKSPACE_HOST }}
      DEV_DATABRICKS_TOKEN: ${{ secrets.DEV_DATABRICKS_TOKEN }}
      DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
      HML_WORKSPACE_HOST: ${{ secrets.HML_WORKSPACE_HOST }}
      HML_DATABRICKS_TOKEN: ${{ secrets.HML_DATABRICKS_TOKEN }}
      HML_DEPLOY_USER: ${{ secrets.HML_DEPLOY_USER }}
      PRD_WORKSPACE_HOST: ${{ secrets.PRD_WORKSPACE_HOST }}
      PRD_DATABRICKS_TOKEN: ${{ secrets.PRD_DATABRICKS_TOKEN }}
      PRD_DEPLOY_USER: ${{ secrets.PRD_DEPLOY_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Compile Python
        run: python -m compileall data_platform config pipelines resources sql

      - name: Validate active CI provider secrets contract
        run: python -m data_platform.orchestration.validate_active_ci_provider

      - name: Generate platform artifacts
        run: |
          python -m data_platform.flow_specs.generate_registry
          python -m data_platform.flow_specs.generate_jobs --environment dev
          python -m data_platform.flow_specs.generate_jobs --environment hml
          python -m data_platform.flow_specs.generate_jobs --environment prd
          python -m data_platform.flow_specs.generate_resources --environment dev
          python -m data_platform.flow_specs.generate_resources --environment hml
          python -m data_platform.flow_specs.generate_resources --environment prd
          python -m data_platform.flow_specs.generate_databricks_bundle_root
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment dev
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment hml
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment prd

      - name: Validate bundle on DEV target
        env:
          DATABRICKS_HOST: ${{ secrets.DEV_WORKSPACE_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DEV_DATABRICKS_TOKEN }}
        run: databricks bundle validate -t dev --var="deploy_user=${{ secrets.DEV_DEPLOY_USER }}"

  deploy-dev:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Generate bundle artifacts
        run: |
          python -m data_platform.flow_specs.generate_databricks_bundle_root
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment dev
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment hml
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment prd

      - name: Deploy DEV
        env:
          DATABRICKS_HOST: ${{ secrets.DEV_WORKSPACE_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DEV_DATABRICKS_TOKEN }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
        run: databricks bundle deploy -t dev --var="deploy_user=${{ secrets.DEV_DEPLOY_USER }}"

  deploy-hml:
    if: github.ref == 'refs/heads/main'
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: hml

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Generate bundle artifacts
        run: |
          python -m data_platform.flow_specs.generate_databricks_bundle_root
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment dev
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment hml
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment prd

      - name: Deploy HML
        env:
          DATABRICKS_HOST: ${{ secrets.HML_WORKSPACE_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.HML_DATABRICKS_TOKEN }}
          HML_DEPLOY_USER: ${{ secrets.HML_DEPLOY_USER }}
        run: databricks bundle deploy -t hml --var="deploy_user=${{ secrets.HML_DEPLOY_USER }}"

  deploy-prd:
    if: github.ref == 'refs/heads/main'
    needs: deploy-hml
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks version

      - name: Generate bundle artifacts
        run: |
          python -m data_platform.flow_specs.generate_databricks_bundle_root
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment dev
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment hml
          python -m data_platform.flow_specs.generate_databricks_resources_yaml --environment prd

      - name: Deploy PRD
        env:
          DATABRICKS_HOST: ${{ secrets.PRD_WORKSPACE_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.PRD_DATABRICKS_TOKEN }}
          PRD_DEPLOY_USER: ${{ secrets.PRD_DEPLOY_USER }}
        run: databricks bundle deploy -t prd --var="deploy_user=${{ secrets.PRD_DEPLOY_USER }}"
