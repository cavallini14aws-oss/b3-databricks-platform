name: pr-gate

on:
  pull_request:
    branches:
      - main
      - master
      - dry-run-free-edition
  workflow_dispatch:

jobs:
  pre-deploy-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pip install databricks-cli

      - name: Validate active provider
        run: ./bin/validate-active-provider

      - name: Run hard gate
        run: ./bin/pre-deploy-gate dev
