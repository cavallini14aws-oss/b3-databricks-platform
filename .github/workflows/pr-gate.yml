name: pr-gate

on:
  pull_request:
    branches:
      - main
      - master
      - dry-run-free-edition
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pip install databricks-cli

      - name: Validate active provider
        run: ./bin/validate-active-provider

      - name: Run hard gate
        run: ./bin/pre-deploy-gate dev

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-gate-artifacts
          path: artifacts/
          if-no-files-found: ignore
