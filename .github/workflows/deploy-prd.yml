name: deploy-prd

on:
  workflow_dispatch:

jobs:
  deploy-prd:
    runs-on: ubuntu-latest
    environment: prd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          cat > ~/.databrickscfg <<CFG
          [${{ secrets.DATABRICKS_PROFILE_NAME }}]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}
          CFG

      - name: Validate active provider
        run: ./bin/validate-active-provider

      - name: Promote guarded
        run: ./bin/promote-guarded prd "${{ secrets.DATABRICKS_PROFILE_NAME }}"
