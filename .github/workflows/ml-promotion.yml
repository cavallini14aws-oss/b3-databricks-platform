name: ML Promotion Flow

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: "Source environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - hml
      target_env:
        description: "Target environment"
        required: true
        default: "hml"
        type: choice
        options:
          - hml
          - prd
      model_name:
        description: "Model name"
        required: true
        default: "clientes_status_classifier"
        type: string
      model_version:
        description: "Model version (optional; empty = resolve latest valid)"
        required: false
        default: ""
        type: string

jobs:
  validate-ml-promotion-input:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source/target pair
        run: |
          SOURCE="${{ github.event.inputs.source_env }}"
          TARGET="${{ github.event.inputs.target_env }}"

          if [[ "$SOURCE" == "dev" && "$TARGET" == "hml" ]]; then
            echo "valid promotion path: dev -> hml"
            exit 0
          fi

          if [[ "$SOURCE" == "hml" && "$TARGET" == "prd" ]]; then
            echo "valid promotion path: hml -> prd"
            exit 0
          fi

          echo "invalid promotion path: $SOURCE -> $TARGET"
          exit 1

  promote-ml:
    needs: validate-ml-promotion-input
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ML promotion script
        env:
          SOURCE_ENV: ${{ github.event.inputs.source_env }}
          TARGET_ENV: ${{ github.event.inputs.target_env }}
          MODEL_NAME: ${{ github.event.inputs.model_name }}
          MODEL_VERSION: ${{ github.event.inputs.model_version }}
        run: |
          CMD=(python -m b3_platform.governance.promote_and_deploy_ml \
            --model-name "$MODEL_NAME" \
            --source-env "$SOURCE_ENV" \
            --target-env "$TARGET_ENV")

          if [[ -n "$MODEL_VERSION" ]]; then
            CMD+=(--model-version "$MODEL_VERSION")
          fi

          echo "Executing: ${CMD[*]}"
          "${CMD[@]}"
