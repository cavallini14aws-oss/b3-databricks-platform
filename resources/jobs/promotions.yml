resources:
  jobs:
    promote_dev_to_hml:
      name: promote-dev-to-hml
      job_clusters:
        - job_cluster_key: promotion_job_cluster
          new_cluster:
            spark_version: ${var.default_spark_version}
            node_type_id: ${var.default_node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: promote_dev_to_hml_task
          job_cluster_key: promotion_job_cluster
          spark_python_task:
            python_file: ${workspace.root_path}/data_platform/governance/promote_and_deploy_ml.py
            parameters:
              - --source-env
              - dev
              - --target-env
              - hml
              - --project
              - clientes
              - --model-name
              - clientes_status_classifier
              - --model-version
              - latest
              - --accuracy
              - "0.71"
              - --f1
              - "0.59"
              - --auc
              - "0.75"
              - --tests-passed
              - "true"
              - --manual-approval
              - "false"
      tags:
        environment: dev
        transition: dev_to_hml
        project: clientes

    promote_hml_to_prd:
      name: promote-hml-to-prd
      job_clusters:
        - job_cluster_key: promotion_job_cluster
          new_cluster:
            spark_version: ${var.default_spark_version}
            node_type_id: ${var.default_node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: promote_hml_to_prd_task
          job_cluster_key: promotion_job_cluster
          spark_python_task:
            python_file: ${workspace.root_path}/data_platform/governance/promote_and_deploy_ml.py
            parameters:
              - --source-env
              - hml
              - --target-env
              - prd
              - --project
              - clientes
              - --model-name
              - clientes_status_classifier
              - --model-version
              - latest
              - --accuracy
              - "0.71"
              - --f1
              - "0.61"
              - --auc
              - "0.75"
              - --tests-passed
              - "true"
              - --manual-approval
              - "true"
      tags:
        environment: hml
        transition: hml_to_prd
        project: clientes
