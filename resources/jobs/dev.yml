resources:
  jobs:
    clientes_ml_dev:
      name: clientes-ml-dev
      tasks:
        - task_key: clientes_ml_pipeline_dev
          spark_python_task:
            python_file: ${workspace.root_path}/pipelines/examples/clientes/ml/run_clientes_ml_end_to_end.py
            parameters:
              - --project
              - clientes
              - --config-path
              - config/clientes_ml_pipeline.yml
              - --use-catalog
              - "false"
          existing_cluster_id: ${var.dev_cluster_id}
      tags:
        environment: dev
        project: clientes
