resources:
  jobs:
    mlops_drift_cycle:
      name: mlops-drift-cycle-${bundle.target}
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: mlops_job_cluster
          new_cluster:
            spark_version: ${var.default_spark_version}
            node_type_id: ${var.default_node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: run_mlops_drift_cycle
          job_cluster_key: mlops_job_cluster
          spark_python_task:
            python_file: ${workspace.root_path}/notebooks/free_edition/mlops_drift_cycle.py

