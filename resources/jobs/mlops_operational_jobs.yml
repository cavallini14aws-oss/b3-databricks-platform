resources:
  jobs:
    mlops_drift_cycle:
      name: mlops-drift-cycle-${bundle.target}
      max_concurrent_runs: 1
      tasks:
        - task_key: run_mlops_drift_cycle
          python_wheel_task:
            package_name: b3_data_platform
            entry_point: run_mlops_drift_cycle
          libraries:
            - whl: ./dist/*.whl
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "2"

    mlops_postprod_cycle:
