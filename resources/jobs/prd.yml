resources:
  jobs:
    clientes_ml_prd:
      name: clientes-ml-prd
      job_clusters:
        - job_cluster_key: clientes_ml_job_cluster
          new_cluster:
            spark_version: ${var.default_spark_version}
            node_type_id: ${var.default_node_type_id}
            num_workers: 1
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: clientes_ml_pipeline_prd
          job_cluster_key: clientes_ml_job_cluster
          spark_python_task:
            python_file: ${workspace.root_path}/pipelines/examples/clientes/ml/run_clientes_ml_end_to_end.py
            parameters:
              - --project
              - clientes
              - --config-path
              - config/clientes_ml_pipeline.yml
              - --use-catalog
              - "true"
      tags:
        environment: prd
        project: clientes
