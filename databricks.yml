bundle:
  name: databricks-platform-template

artifacts:
  default:
    type: whl
    build: python3 -m build --wheel
    path: .

include:
  - resources/jobs/mlops_operational_jobs.yml
  - resources/jobs/pdf_rag_ingestion_jobs.yml

sync:
  include:
    - notebooks/free_edition/*.py

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  hml:
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  prd:
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
