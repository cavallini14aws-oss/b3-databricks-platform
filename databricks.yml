bundle:
  name: "b3_databricks_platform"
  databricks_cli_version: '>= 0.275.0, < 1.0.0'

include:
  - "artifacts/generated_resources_dev.yml"
  - "artifacts/generated_resources_hml.yml"
  - "artifacts/generated_resources_prd.yml"

variables:
  deploy_user:
    description: "Current deployment identity for bundle permissions"
    default: ""
  hml_run_sp:
    description: "Service principal app id for HML run_as"
    default: "<app-id-hml>"
  prd_run_sp:
    description: "Service principal app id for PRD run_as"
    default: "<app-id-prd>"
  hml_admin_group:
    description: "Admin group for HML bundle permissions"
    default: "<group-hml-admin>"
  prd_admin_group:
    description: "Admin group for PRD bundle permissions"
    default: "<group-prd-admin>"
  environment:
    description: "Resolved deployment environment"
    default: "dev"
  use_catalog:
    description: "Whether target uses Unity Catalog"
    default: false
  default_config_path:
    description: "Default config path for flows"
    default: "config/clientes_ml_pipeline.yml"
  workspace_root:
    description: "Workspace root for project files"
    default: "/Workspace/Repos/b3-databricks-platform/b3-databricks-platform"

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/b3_databricks_platform/dev"
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE
    variables:
      environment: "dev"
      use_catalog: false
      default_config_path: "config/clientes_ml_pipeline.yml"
      workspace_root: "/Workspace/Repos/b3-databricks-platform/b3-databricks-platform"
  hml:
    default: false
    mode: production
    workspace:
      root_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/b3_databricks_platform/hml"
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE
    variables:
      environment: "hml"
      use_catalog: true
      default_config_path: "config/clientes_ml_pipeline.yml"
      workspace_root: "/Workspace/Repos/b3-databricks-platform/b3-databricks-platform"
  prd:
    default: false
    mode: production
    workspace:
      root_path: "/Workspace/Users/${workspace.current_user.userName}/.bundle/b3_databricks_platform/prd"
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE
    variables:
      environment: "prd"
      use_catalog: true
      default_config_path: "config/clientes_ml_pipeline.yml"
      workspace_root: "/Workspace/Repos/b3-databricks-platform/b3-databricks-platform"
