bundle:
  name: b3_databricks_platform

artifacts:
  default:
    type: whl
    build: python3 -m build --wheel
    path: .

include:
  - resources/jobs/mlops_operational_jobs.yml
  - resources/jobs/dev.yml
  - resources/jobs/hml.yml
  - resources/jobs/prd.yml
  - resources/jobs/promotions.yml

sync:
  include:
    - notebooks/free_edition/*.py

variables:
  deploy_user:
    description: Current deployment identity for bundle permissions
    default: ""

  hml_run_sp:
    description: Service principal app id for HML run_as
    default: "<app-id-hml>"

  prd_run_sp:
    description: Service principal app id for PRD run_as
    default: "<app-id-prd>"

  hml_admin_group:
    description: Admin group for HML bundle permissions
    default: "<group-hml-admin>"

  prd_admin_group:
    description: Admin group for PRD bundle permissions
    default: "<group-prd-admin>"

  default_spark_version:
    description: Default Databricks Runtime version
    default: "15.4.x-scala2.12"

  default_node_type_id:
    description: Default node type id
    default: "Standard_DS3_v2"

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE

  hml:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.hml_run_sp}
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE
      - level: CAN_MANAGE
        group_name: ${var.hml_admin_group}
      - level: CAN_MANAGE
        service_principal_name: ${var.hml_run_sp}

  prd:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      service_principal_name: ${var.prd_run_sp}
    permissions:
      - user_name: ${var.deploy_user}
        level: CAN_MANAGE
      - level: CAN_MANAGE
        group_name: ${var.prd_admin_group}
      - level: CAN_MANAGE
        service_principal_name: ${var.prd_run_sp}
