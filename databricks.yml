bundle:
  name: b3-databricks-platform

artifacts:
  default:
    type: whl
    build: python setup.py bdist_wheel
    path: .

include:
  - resources/jobs/mlops_operational_jobs.yml

targets:
  dev:
    default: true
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  hml:
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  prd:
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
