env: prd

workspace:
  provider: databricks
  mode: official
  readiness_level: strict

identity:
  execution_principal_type: service_principal
  execution_principal_name: TO_BE_DEFINED
  execution_group: TO_BE_DEFINED

storage:
  catalog: b3_prd
  schema_ai: ai
  schema_ops: ops
  volume_name: pdf_rag_lab_docs
  volume_path: /Volumes/b3_prd/ai/pdf_rag_lab_docs

serving:
  llm_provider: databricks
  serving_endpoint: TO_BE_DEFINED
  foundation_model_api_allowed: true

runtime:
  python_version: "3.10"
  dependency_manifest: requirements-rag-lab.txt
  manual_pip_install_allowed: false

compute:
  access_mode: TO_BE_DEFINED
  runtime: TO_BE_DEFINED
  unity_catalog_required: true

governance:
  branch_protection_required: true
  pr_merge_gate_required: true
  runtime_guard_required: true

notes:
  - PRD requires auditable and approved execution path.
  - Secrets, grants, endpoint ownership and compute ownership must be defined before go-live.
