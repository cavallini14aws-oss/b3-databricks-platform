env: hml

workspace:
  provider: databricks
  mode: official
  readiness_level: controlled

identity:
  execution_principal_type: service_principal
  execution_principal_name: TO_BE_DEFINED
  execution_group: mlops_hml

storage:
  catalog: b3_hml
  schema_ai: ai
  schema_ops: ops
  volume_name: pdf_rag_lab_docs
  volume_path: /Volumes/b3_hml/ai/pdf_rag_lab_docs

serving:
  llm_provider: databricks
  serving_endpoint: b3-pdf-rag-hml
  foundation_model_api_allowed: true

runtime:
  python_version: "3.10"
  dependency_manifest: requirements-rag-lab.txt
  manual_pip_install_allowed: false

compute:
  access_mode: STANDARD
  runtime: 15.4.x-scala2.12
  unity_catalog_required: true

governance:
  branch_protection_required: true
  pr_merge_gate_required: true
  runtime_guard_required: true

notes:
  - HML must be promotion-oriented.
  - All required contracts must exist before validation against official workspace.
