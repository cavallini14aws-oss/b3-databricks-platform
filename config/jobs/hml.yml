job:
  environment: hml
  cluster_key: clientes-hml-cluster
  cluster_mode: existing_or_job_cluster
  workspace_root: /Workspace/Users/${workspace.current_user.userName}/.bundle/databricks-platform-template/hml
  default_timeout_seconds: 5400
  max_retries: 1
  use_catalog: true
  default_config_path: config/clientes_ml_pipeline.yml
promotion:
  rules:
  - source_env: dev
    target_env: hml
    requires_approval: false
    require_tests_passed: true
    require_quality_gates: false
  - source_env: hml
    target_env: prd
    requires_approval: true
    require_tests_passed: true
    require_quality_gates: true
quality_gates:
  ml:
    minimum_accuracy: 0.65
    minimum_f1: 0.55
    minimum_auc: 0.65
