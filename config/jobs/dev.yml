job:
  environment: dev
  cluster_key: clientes-dev-cluster
  cluster_mode: existing_or_job_cluster
  workspace_root: /Workspace/Repos/b3-databricks-platform/b3-databricks-platform
  default_timeout_seconds: 3600
  max_retries: 0

promotion:
  rules:
    - source_env: dev
      target_env: hml
      requires_approval: false
      require_tests_passed: true
      require_quality_gates: false

quality_gates:
  ml:
    minimum_accuracy: 0.0
    minimum_f1: 0.0
    minimum_auc: 0.0
