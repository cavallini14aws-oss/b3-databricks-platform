project:
  name: b3_clientes_mlops
  owner: mlops
  criticality: high
  regulator_context: b3

environments:
  dev:
    databricks:
      enabled: true
      use_catalog: false
      workspace_host_key: DEV_WORKSPACE_HOST
      databricks_token_key: DEV_DATABRICKS_TOKEN
      cluster_id_key: DEV_CLUSTER_ID
      secret_scope: keyvault-dev-datahub
      ready: false

    notifications:
      enabled: true
      severity_min: WARNING

      email:
        enabled: true
        recipients:
          - mlops-dev@empresa.com
        smtp:
          scope: keyvault-dev-datahub
          host_key: SMTP_HOST
          port_key: SMTP_PORT
          username_key: SMTP_USERNAME
          password_key: SMTP_PASSWORD
          required: true
          ready: false

      slack:
        enabled: false
        webhook:
          scope: keyvault-dev-datahub
          key: SLACK_WEBHOOK_DEV
          required: false
          ready: false

      teams:
        enabled: false
        webhook:
          scope: keyvault-dev-datahub
          key: TEAMS_WEBHOOK_DEV
          required: false
          ready: false

    retraining:
      auto_open_from_drift_critical: true
      auto_open_from_postprod_critical: true
      auto_approve_drift_critical: false
      auto_approve_postprod_critical: false

    thresholds:
      drift_warning_relative_diff: 0.10
      drift_critical_relative_diff: 0.30
      postprod_min_accuracy: 0.70
      postprod_min_f1: 0.70
      postprod_min_precision: 0.70
      postprod_min_recall: 0.70
      suggest_rollback_on_postprod_critical: true
      require_smoke_after_rollback: true
      require_smoke_after_retraining: true

    retention:
      tb_model_predictions_days: 90
      tb_ml_alert_events_days: 180
      tb_model_postprod_metrics_days: 365
      tb_model_retraining_requests_days: 365
      tb_ml_governance_runs_days: 365
      tb_ml_smoke_runs_days: 180

    jobs:
      drift_cycle:
        enabled: true
        cron: "0 0 8 * * ?"
        retries: 0
        timeout_seconds: 3600
      postprod_cycle:
        enabled: true
        cron: "0 0 9 * * ?"
        retries: 0
        timeout_seconds: 3600
      retraining_cycle:
        enabled: true
        cron: "0 0 10 * * ?"
        retries: 0
        timeout_seconds: 5400
      operational_cycle:
        enabled: true
        cron: "0 0 11 * * ?"
        retries: 0
        timeout_seconds: 1800

    cicd:
      github_actions:
        enabled: true
      azure_devops:
        enabled: false
      bitbucket:
        enabled: false

    access_control:
      promote_roles:
        - mlops
        - platform_admin
      rollback_roles:
        - mlops
        - platform_admin
      approve_retraining_roles:
        - mlops
        - model_owner
      execute_retraining_roles:
        - mlops
        - platform_admin
      operate_mlops_cycles_roles:
        - mlops
        - platform_admin

    go_live:
      blockers: []
      ready: false

  hml:
    databricks:
      enabled: true
      use_catalog: true
      workspace_host_key: HML_WORKSPACE_HOST
      databricks_token_key: HML_DATABRICKS_TOKEN
      cluster_id_key: HML_CLUSTER_ID
      secret_scope: keyvault-hml-datahub
      ready: false

    notifications:
      enabled: true
      severity_min: WARNING

      email:
        enabled: true
        recipients:
          - mlops-hml@empresa.com
        smtp:
          scope: keyvault-hml-datahub
          host_key: SMTP_HOST
          port_key: SMTP_PORT
          username_key: SMTP_USERNAME
          password_key: SMTP_PASSWORD
          required: true
          ready: false

      slack:
        enabled: true
        webhook:
          scope: keyvault-hml-datahub
          key: SLACK_WEBHOOK_HML
          required: true
          ready: false

      teams:
        enabled: false
        webhook:
          scope: keyvault-hml-datahub
          key: TEAMS_WEBHOOK_HML
          required: false
          ready: false

    retraining:
      auto_open_from_drift_critical: true
      auto_open_from_postprod_critical: true
      auto_approve_drift_critical: false
      auto_approve_postprod_critical: false

    thresholds:
      drift_warning_relative_diff: 0.10
      drift_critical_relative_diff: 0.30
      postprod_min_accuracy: 0.70
      postprod_min_f1: 0.65
      postprod_min_precision: 0.65
      postprod_min_recall: 0.65
      suggest_rollback_on_postprod_critical: true
      require_smoke_after_rollback: true
      require_smoke_after_retraining: true

    retention:
      tb_model_predictions_days: 90
      tb_ml_alert_events_days: 180
      tb_model_postprod_metrics_days: 365
      tb_model_retraining_requests_days: 365
      tb_ml_governance_runs_days: 365
      tb_ml_smoke_runs_days: 180

    jobs:
      drift_cycle:
        enabled: true
        cron: "0 0 7 * * ?"
        retries: 1
        timeout_seconds: 3600
      postprod_cycle:
        enabled: true
        cron: "0 30 7 * * ?"
        retries: 1
        timeout_seconds: 3600
      retraining_cycle:
        enabled: true
        cron: "0 0 8 * * ?"
        retries: 1
        timeout_seconds: 5400
      operational_cycle:
        enabled: true
        cron: "0 30 8 * * ?"
        retries: 1
        timeout_seconds: 1800

    cicd:
      github_actions:
        enabled: true
      azure_devops:
        enabled: false
      bitbucket:
        enabled: false

    access_control:
      promote_roles:
        - mlops
        - platform_admin
      rollback_roles:
        - mlops
        - platform_admin
      approve_retraining_roles:
        - mlops
        - model_owner
      execute_retraining_roles:
        - mlops
        - platform_admin
      operate_mlops_cycles_roles:
        - mlops
        - platform_admin

    go_live:
      blockers:
        - "secrets_hml_pendentes"
        - "rehearsal_hml_pendente"
      ready: false

  prd:
    databricks:
      enabled: true
      use_catalog: true
      workspace_host_key: PRD_WORKSPACE_HOST
      databricks_token_key: PRD_DATABRICKS_TOKEN
      cluster_id_key: PRD_CLUSTER_ID
      secret_scope: keyvault-prd-datahub
