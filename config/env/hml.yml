environment:
  name: hml
  use_catalog: true
  debug_mode: true

storage:
  model_artifact_base_path: "/mnt/hml/models/clientes"
  enable_model_artifact_persistence: true

flags:
  enable_data_pipeline: true
  enable_ml_pipeline: true
  enable_llm_pipeline: false
  enable_baseline: true
  enable_confusion_matrix: true
  enable_predictions_logging: true
  enable_registry: true
  enable_feature_store: false
  enable_strict_quality_gates: true

alerting:
  enable_alerting: true
  severity_min: "WARNING"
  email_enabled: true
  slack_enabled: false
  teams_enabled: false
  recipients: ""
  owner_group: "mlops"
  smtp_secret_scope: ""
  smtp_host_key: ""
  smtp_port_key: ""
  smtp_username_key: ""
  smtp_password_key: ""
  webhook_secret_scope: ""
  slack_webhook_key: ""
  teams_webhook_key: ""
